<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Calm rounded tile -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>

  <!-- Dimmed reading lines -->
  <rect x="30" y="34" width="68" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="30" y="52" width="50" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.55"/>

  <!-- Highlighted focus line: bold leading half (bionic), lighter tail -->
  <rect x="22" y="64" width="84" height="21" rx="8" fill="#FBBF24" fill-opacity="0.28"/>
  <rect x="58" y="70" width="40" height="9" rx="4.5" fill="#FBBF24"/>
  <rect x="30" y="70" width="32" height="9" rx="4.5" fill="#B45309"/>

  <!-- More dimmed reading lines -->
  <rect x="30" y="88" width="58" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="30" y="106" width="38" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
